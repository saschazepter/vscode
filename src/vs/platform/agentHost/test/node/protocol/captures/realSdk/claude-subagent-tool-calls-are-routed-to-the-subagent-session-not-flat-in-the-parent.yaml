version: 1
exchanges:
  - method: POST
    path: /v1/messages
    dialect: anthropic
    request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Use the `Task` tool to spawn a subagent to list the files in the current working directory. The subagent should call a single read-only tool (e.g. `view` or shell with `ls`) to enumerate the directory. Do not enumerate the directory yourself — delegate to the subagent.
    response:
      content:
        - type: text
          text: I'll delegate this to a subagent.
        - type: tool_use
          id: toolcall_0
          name: Agent
          input:
            description: List files in working directory
            prompt: 'List the files in the current working directory by calling a single read-only tool. Run exactly one command: `ls -la` in the current working directory (which is /private${workdir}/ahp-subagent-test-2rqGsn). Then report the full enumerated list of files and directories you found. Do not call any other tools.'
            subagent_type: Explore
      stopReason: tool_use
      usage:
        inputTokens: 2426
        outputTokens: 283
  - method: POST
    path: /v1/messages
    dialect: anthropic
    request:
      model: claude-haiku-4.5
      system: ${system}
      messages:
        - role: user
          content: 'List the files in the current working directory by calling a single read-only tool. Run exactly one command: `ls -la` in the current working directory (which is /private${workdir}/ahp-subagent-test-2rqGsn). Then report the full enumerated list of files and directories you found. Do not call any other tools.'
    response:
      content:
        - type: tool_use
          id: toolcall_1
          name: Bash
          input:
            command: ls -la /private${workdir}/ahp-subagent-test-2rqGsn
      stopReason: tool_use
      usage:
        inputTokens: 3
        outputTokens: 102
  - method: POST
    path: /v1/messages
    dialect: anthropic
    request:
      model: claude-haiku-4.5
      system: ${system}
      messages:
        - role: user
          content: 'List the files in the current working directory by calling a single read-only tool. Run exactly one command: `ls -la` in the current working directory (which is /private${workdir}/ahp-subagent-test-2rqGsn). Then report the full enumerated list of files and directories you found. Do not call any other tools.'
        - role: assistant
          content:
            - type: tool_use
              name: Bash
              input:
                command: ls -la /private${workdir}/ahp-subagent-test-2rqGsn
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_1
              content: |-
                total 16
                drwx------    4 ${user}  staff    128 Jul  7 16:13 .
                drwx------@ 975 ${user}  staff  31200 Jul  7 16:13 ..
                -rw-r--r--    1 ${user}  staff      5 Jul  7 16:13 file-a.txt
                -rw-r--r--    1 ${user}  staff      4 Jul  7 16:13 file-b.txt
    response:
      content: |-
        The current working directory contains the following files and directories:

        1. `.` (current directory)
        2. `..` (parent directory)
        3. `file-a.txt` (regular file, 5 bytes)
        4. `file-b.txt` (regular file, 4 bytes)
      stopReason: end_turn
      usage:
        inputTokens: 6
        outputTokens: 71
  - method: POST
    path: /v1/messages
    dialect: anthropic
    request:
      model: claude-opus-4.8
      system: ${system}
      messages:
        - role: user
          content: Use the `Task` tool to spawn a subagent to list the files in the current working directory. The subagent should call a single read-only tool (e.g. `view` or shell with `ls`) to enumerate the directory. Do not enumerate the directory yourself — delegate to the subagent.
        - role: assistant
          content:
            - type: thinking
            - type: text
              text: I'll delegate this to a subagent.
            - type: tool_use
              name: Agent
              input:
                description: List files in working directory
                prompt: 'List the files in the current working directory by calling a single read-only tool. Run exactly one command: `ls -la` in the current working directory (which is /private${workdir}/ahp-subagent-test-2rqGsn). Then report the full enumerated list of files and directories you found. Do not call any other tools.'
                subagent_type: Explore
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolcall_0
              content: |-
                The current working directory contains the following files and directories:

                1. `.` (current directory)
                2. `..` (parent directory)
                3. `file-a.txt` (regular file, 5 bytes)
                4. `file-b.txt` (regular file, 4 bytes)
    response:
      content: |-
        The subagent enumerated the working directory. It found two files:

        - `file-a.txt` (5 bytes)
        - `file-b.txt` (4 bytes)

        (plus the standard `.` and `..` directory entries)
      stopReason: end_turn
      usage:
        inputTokens: 2
        outputTokens: 73
