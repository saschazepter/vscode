version: 1
exchanges:
  - method: POST
    path: /responses
    dialect: responses
    request:
      model: gpt-5.3-codex
      system: ${system}
      messages:
        - role: user
          content: Call the get_magic_word tool and then tell me the exact magic word it returned.
    response:
      content:
        - type: text
          text: Calling `get_magic_word` now and I’ll return the exact result.
        - type: tool_use
          id: toolcall_0
          name: get_magic_word
          input: {}
      stopReason: tool_use
      usage:
        inputTokens: 9457
        outputTokens: 50
