version: 1
rounds:
  - clientToServer:
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Create output/report.txt containing exactly NESTED_CREATED.
            origin:
              kind: user
      - channel: ${chat_0}
        action:
          type: chat/toolCallConfirmed
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          approved: true
          confirmed: user-action
    serverToClient:
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnStarted
          turnId: ${turn_0}
          message:
            text: Create output/report.txt containing exactly NESTED_CREATED.
            origin:
              kind: user
      - channel: ${session_0}
        action:
          type: session/titleChanged
      - channel: ${session_0}
        action:
          type: session/serverToolsChanged
      - method: root/sessionAdded
      - channel: ${session_0}
        action:
          type: session/ready
      - channel: ${session_0}
        action:
          type: session/changesetsChanged
      - channel: ${session_0}
        action:
          type: session/customizationsChanged
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: I'll create that file for you.
      - channel: ${chat_0}
        action:
          type: chat/toolCallStart
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          toolName: Write
          displayName: Write file
      - channel: ${chat_0}
        action:
          type: chat/toolCallDelta
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: Editing [report.txt](file://${workdir}/output/report.txt)
          toolInput: |-
            {
              "file_path": "${workdir}/output/report.txt",
              "content": "NESTED_CREATED"
            }
          confirmed: not-needed
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/toolCallReady
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          invocationMessage: Editing [report.txt](file://${workdir}/output/report.txt)
          toolInput: |-
            {
              "file_path": "${workdir}/output/report.txt",
              "content": "NESTED_CREATED"
            }
      - channel: ${session_0}
        action:
          type: session/inputNeededSet
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/toolCallConfirmed
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          approved: true
          confirmed: user-action
      - channel: ${session_0}
        action:
          type: session/inputNeededRemoved
      - channel: ${chat_0}
        action:
          type: chat/toolCallComplete
          turnId: ${turn_0}
          toolCallId: ${toolCall_0}
          result:
            success: true
            pastTenseMessage: Edited [report.txt](file://${workdir}/output/report.txt)
            content:
              - type: text
                text: 'File created successfully at: ${workdir}/output/report.txt (file state is current in your context — no need to Read it back)'
              - type: fileEdit
      - channel: ${chat_0}
        action:
          type: chat/responsePart
          turnId: ${turn_0}
          part:
            kind: markdown
            content: Created `output/report.txt` containing exactly `NESTED_CREATED`.
      - channel: ${chat_0}
        action:
          type: chat/usage
          turnId: ${turn_0}
      - channel: ${session_0}
        action:
          type: session/chatUpdated
      - channel: ${chat_0}
        action:
          type: chat/turnComplete
          turnId: ${turn_0}
