parameters:
  - name: runIntegrationTests
    type: boolean
    default: true

steps:
  - task: AzureCLI@2
    inputs:
      azureSubscription: 'VS Code Development WIF'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: npm run setup
      workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Setup copilot test environment

  - script: npm run setup:dotnet
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Install dotnet cli

  - script: npm run typecheck
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Typecheck

  - script: npm run lint
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Lint

  - script: npm run compile
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Compile

  - script: npm run test:unit
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Run vitest unit tests

  - script: |
      set +e
      echo '=== df -hT ==='
      df -hT
      echo '=== top consumers on / (one level) ==='
      sudo du -xh -d 1 / 2>/dev/null | sort -hr | head -20
      echo '=== /var breakdown ==='
      sudo du -xh -d 1 /var 2>/dev/null | sort -hr | head -15
      echo '=== /usr breakdown ==='
      sudo du -xh -d 1 /usr 2>/dev/null | sort -hr | head -15
      echo '=== /home + /root + /tmp ==='
      sudo du -sxh /home /root /tmp /var/lib/docker /var/cache /var/log 2>/dev/null
    displayName: Disk usage (before simulate)
    condition: always()

  - script: npm run simulate-ci
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Run simulation tests

  - script: |
      set +e
      echo '=== df -hT ==='
      df -hT
      echo '=== top consumers on / (one level) ==='
      sudo du -xh -d 1 / 2>/dev/null | sort -hr | head -20
      echo '=== /var breakdown ==='
      sudo du -xh -d 1 /var 2>/dev/null | sort -hr | head -15
      echo '=== /usr breakdown ==='
      sudo du -xh -d 1 /usr 2>/dev/null | sort -hr | head -15
      echo '=== /home + /root + /tmp ==='
      sudo du -sxh /home /root /tmp /var/lib/docker /var/cache /var/log 2>/dev/null
    displayName: Disk usage (after simulate)
    condition: always()

  - ${{ if eq(parameters.runIntegrationTests, true) }}:
    - script: xvfb-run -a npm run test:extension
      workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
      displayName: Run extension tests

  - script: npm run test:prompt
    workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
    displayName: Run prompt tests

  - ${{ if eq(parameters.runIntegrationTests, true) }}:
    - script: xvfb-run -a npm run test:completions-core
      workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
      displayName: Run completions core tests

    - script: xvfb-run -a npm run test:sanity
      workingDirectory: $(Build.SourcesDirectory)/extensions/copilot
      displayName: Run sanity tests
