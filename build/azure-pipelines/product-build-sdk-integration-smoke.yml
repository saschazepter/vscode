# VS Code SDK Canary Smoke Test
#
# A fast, single-job check that an arbitrary @github/copilot-sdk (and optionally
# @github/copilot) version can be resolved from the private Azure Artifacts feed
# and applied to the VS Code manifests. It does NOT run a full product build —
# use this to validate the canary-override + feed plumbing before wiring up the
# full integration pipeline (product-build-sdk-integration.yml).
#
# See microsoft/vscode-engineering specs/sdk-vscode-integration.spec.md.
#
# Correct ordering matters: npm auth to the feed must be established BEFORE the
# override refreshes the lockfile (apply-sdk-canary-override.ts runs
# `npm install --package-lock-only`, which resolves from the feed). The full
# node-modules jobs authenticate after their cache-key step, so this smoke test
# deliberately authenticates first.
#
# NOTE: Wire this YAML to an Azure DevOps pipeline definition (feed-authenticated
# service connection) before first use.

name: $(Date:yyyyMMdd)$(Rev:.r)-sdk-canary-smoke

pr: none
trigger: none

parameters:
  - name: VSCODE_SDK_CANARY_VERSION
    displayName: "@github/copilot-sdk version to resolve from the feed"
    type: string
  - name: VSCODE_CLI_CANARY_VERSION
    displayName: "@github/copilot version (blank = leave as pinned)"
    type: string
    default: ""
  - name: NPM_REGISTRY
    displayName: "NPM registry (canary feed)"
    type: string
    default: "https://pkgs.dev.azure.com/monacotools/Monaco/_packaging/vscode/npm/registry/"

variables:
  - name: NPM_REGISTRY
    value: ${{ parameters.NPM_REGISTRY }}
  - name: VSCODE_SDK_CANARY_VERSION
    value: ${{ parameters.VSCODE_SDK_CANARY_VERSION }}
  - name: VSCODE_CLI_CANARY_VERSION
    value: ${{ parameters.VSCODE_CLI_CANARY_VERSION }}

jobs:
  - job: SdkCanarySmoke
    displayName: "Resolve SDK canary from feed"
    pool:
      name: 1es-ubuntu-22.04-x64
      os: linux
    timeoutInMinutes: 20
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSource: fromFile
          versionFilePath: .nvmrc

      - script: |
          set -e
          npm config set registry "$NPM_REGISTRY"
          echo "##vso[task.setvariable variable=NPMRC_PATH]$(npm config get userconfig)"
        displayName: Setup NPM registry

      - task: npmAuthenticate@0
        inputs:
          workingFile: $(NPMRC_PATH)
        displayName: Authenticate to feed

      # Applies the override AND verifies each version resolved from the feed
      # (apply-sdk-canary-override.ts throws if a version is missing).
      - script: node build/azure-pipelines/common/apply-sdk-canary-override.ts
        env:
          VSCODE_SDK_CANARY_VERSION: $(VSCODE_SDK_CANARY_VERSION)
          VSCODE_CLI_CANARY_VERSION: $(VSCODE_CLI_CANARY_VERSION)
        displayName: Apply + verify SDK canary override

      - script: |
          set -e
          echo "Resolved dependency versions:"
          node -p "'root  @github/copilot-sdk: ' + (require('./package.json').dependencies['@github/copilot-sdk'])"
          node -p "'root  @github/copilot:     ' + (require('./package.json').dependencies['@github/copilot'])"
          git --no-pager diff --stat package.json package-lock.json remote/package.json remote/package-lock.json || true
        displayName: Show resolved versions
